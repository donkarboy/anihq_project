name: anihq Scraper

on:
  schedule:
    - cron: "*/20 * * * *"   # Every 20 minutes
  workflow_dispatch:          # Manual "Run workflow" button in the Actions tab

# Prevents overlapping runs. A 500-URL batch can take longer than the 20-min
# cron interval — without this, two runs can race on `git push` and one run's
# processed/failed URLs get silently dropped when its push is rejected.
concurrency:
  group: anihq-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install curl_cffi beautifulsoup4

      - name: Run extractor (batch of 500 URLs)
        run: python main.py

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A --ignore-errors
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "scrape: batch update $(date -u +'%Y-%m-%d %H:%M UTC')"

            # Retry the push a few times with a rebase in between, in case
            # another run (scheduled or manual) pushed in the meantime.
            for i in 1 2 3 4 5; do
              if git push; then
                echo "Push succeeded."
                break
              fi
              echo "Push rejected (attempt $i) — pulling and retrying..."
              git pull --rebase --autostash origin "$(git rev-parse --abbrev-ref HEAD)"
              sleep 3
            done
          fi